{% extends "base.html" %}

{% block title %}Jobber - FieldFlow{% endblock %}

{% block content %}
<div x-data="{ filterStatus: '{{ status_filter or '' }}' }">
    <div class="sm:flex sm:items-center sm:justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Jobber</h1>
    </div>

    <!-- Status filter -->
    <div class="mt-4 flex flex-wrap gap-2">
        <button @click="filterStatus = ''; htmx.ajax('GET', '/app/jobs/table', '#job-table')"
                :class="filterStatus === '' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-300'"
                class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white">
            Alle
        </button>
        <button @click="filterStatus = 'unscheduled'; htmx.ajax('GET', '/app/jobs/table?status=unscheduled', '#job-table')"
                :class="filterStatus === 'unscheduled' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-300'"
                class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white">
            Uplanlagt
        </button>
        <button @click="filterStatus = 'scheduled'; htmx.ajax('GET', '/app/jobs/table?status=scheduled', '#job-table')"
                :class="filterStatus === 'scheduled' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-300'"
                class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white">
            Planlagt
        </button>
        <button @click="filterStatus = 'in_progress'; htmx.ajax('GET', '/app/jobs/table?status=in_progress', '#job-table')"
                :class="filterStatus === 'in_progress' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-300'"
                class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white">
            Under arbeid
        </button>
        <button @click="filterStatus = 'completed'; htmx.ajax('GET', '/app/jobs/table?status=completed', '#job-table')"
                :class="filterStatus === 'completed' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-300'"
                class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white">
            Fullfort
        </button>
        <button @click="filterStatus = 'cancelled'; htmx.ajax('GET', '/app/jobs/table?status=cancelled', '#job-table')"
                :class="filterStatus === 'cancelled' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-300'"
                class="rounded-md px-3 py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white">
            Kansellert
        </button>
    </div>

    <!-- Jobs table -->
    <div id="job-table" class="mt-6">
        {% include "jobs/_table.html" %}
    </div>
</div>
{% endblock %}
