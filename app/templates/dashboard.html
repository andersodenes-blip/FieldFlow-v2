{% extends "base.html" %}

{% block title %}Dashboard - FieldFlow{% endblock %}

{% block content %}
<div>
    <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
    <p class="mt-2 text-sm text-gray-600">Velkommen til FieldFlow, {{ user.email }}.</p>

    <div class="mt-8 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4">
        <div class="overflow-hidden rounded-lg bg-white shadow">
            <div class="p-5">
                <div class="text-sm font-medium text-gray-500">Regioner</div>
                <div class="mt-1 text-3xl font-semibold text-gray-900">{{ stats.regions }}</div>
            </div>
        </div>
        <div class="overflow-hidden rounded-lg bg-white shadow">
            <div class="p-5">
                <div class="text-sm font-medium text-gray-500">Teknikere</div>
                <div class="mt-1 text-3xl font-semibold text-gray-900">{{ stats.technicians }}</div>
            </div>
        </div>
        <div class="overflow-hidden rounded-lg bg-white shadow">
            <div class="p-5">
                <div class="text-sm font-medium text-gray-500">Kunder</div>
                <div class="mt-1 text-3xl font-semibold text-gray-900">{{ stats.customers }}</div>
            </div>
        </div>
        <div class="overflow-hidden rounded-lg bg-white shadow">
            <div class="p-5">
                <div class="text-sm font-medium text-gray-500">Aktive jobber</div>
                <div class="mt-1 text-3xl font-semibold text-gray-900">{{ stats.active_jobs }}</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
