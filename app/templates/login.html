<!DOCTYPE html>
<html lang="no" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn - FieldFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>
</head>
<body class="h-full">
    <div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8" x-data="{ loading: false, error: '' }">
        <div class="w-full max-w-md space-y-8">
            <div>
                <h1 class="text-center text-3xl font-bold tracking-tight text-indigo-600">FieldFlow</h1>
                <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-gray-900">Logg inn</h2>
            </div>

            <div x-show="error" class="rounded-md bg-red-50 p-4">
                <p class="text-sm text-red-700" x-text="error"></p>
            </div>

            <form class="mt-8 space-y-6" @submit.prevent="
                loading = true;
                error = '';
                const resp = await fetch('/auth/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: $refs.email.value, password: $refs.password.value})
                });
                if (resp.ok) {
                    const data = await resp.json();
                    document.cookie = 'access_token=' + data.access_token + '; path=/; SameSite=Strict';
                    window.location.href = '/app/dashboard';
                } else {
                    const data = await resp.json().catch(() => ({}));
                    error = data.detail || 'Innlogging feilet';
                    loading = false;
                }
            ">
                <div class="space-y-4 rounded-md">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">E-post</label>
                        <input x-ref="email" id="email" name="email" type="email" required
                               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Passord</label>
                        <input x-ref="password" id="password" name="password" type="password" required
                               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                </div>

                <button type="submit" :disabled="loading"
                        class="group relative flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:opacity-50">
                    <span x-show="!loading">Logg inn</span>
                    <span x-show="loading">Logger inn...</span>
                </button>

                {% if auth0_enabled %}
                <div class="relative mt-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="bg-gray-50 px-2 text-gray-500">eller</span></div>
                </div>
                <a href="/auth/login"
                   class="mt-4 flex w-full justify-center rounded-md bg-gray-800 px-3 py-2 text-sm font-semibold text-white hover:bg-gray-700">
                    Logg inn med Auth0
                </a>
                {% endif %}
            </form>
        </div>
    </div>
</body>
</html>
