{% extends "base.html" %}

{% block title %}Kunder - FieldFlow{% endblock %}

{% block content %}
<div x-data="{ showForm: false, editId: null, formData: {name:'', org_number:'', contact_email:'', contact_phone:''}, formError: '', deleting: null }">
    <div class="sm:flex sm:items-center sm:justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Kunder</h1>
        {% if user.role in ['owner', 'admin'] %}
        <button @click="showForm = true; editId = null; formData = {name:'', org_number:'', contact_email:'', contact_phone:''}"
                class="mt-3 sm:mt-0 inline-flex items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
            Ny kunde
        </button>
        {% endif %}
    </div>

    <!-- Search -->
    <div class="mt-4">
        <input type="text" placeholder="Sok etter kunde..."
               hx-get="/app/customers/table"
               hx-trigger="input changed delay:300ms"
               hx-target="#customer-table"
               hx-include="this"
               name="search"
               class="block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm sm:max-w-md">
    </div>

    <!-- Customer table -->
    <div id="customer-table" class="mt-6">
        {% include "customers/_table.html" %}
    </div>

    <!-- Create/Edit modal -->
    <div x-show="showForm" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex min-h-full items-center justify-center p-4">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75" @click="showForm = false"></div>
            <div class="relative w-full max-w-md rounded-lg bg-white p-6 shadow-xl">
                <h3 class="text-lg font-medium text-gray-900" x-text="editId ? 'Rediger kunde' : 'Ny kunde'"></h3>

                <div x-show="formError" class="mt-2 rounded-md bg-red-50 p-3">
                    <p class="text-sm text-red-700" x-text="formError"></p>
                </div>

                <form class="mt-4 space-y-4" @submit.prevent="
                    formError = '';
                    const url = editId ? '/customers/' + editId : '/customers';
                    const method = editId ? 'PUT' : 'POST';
                    const token = document.cookie.split('; ').find(c => c.startsWith('access_token='))?.split('=')[1];
                    const resp = await fetch(url, {
                        method: method,
                        headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                        body: JSON.stringify(formData)
                    });
                    if (resp.ok) {
                        showForm = false;
                        htmx.ajax('GET', '/app/customers/table', '#customer-table');
                    } else {
                        const data = await resp.json().catch(() => ({}));
                        formError = data.detail || 'Noe gikk galt';
                    }
                ">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Navn *</label>
                        <input x-model="formData.name" type="text" required
                               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Org.nummer</label>
                        <input x-model="formData.org_number" type="text"
                               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">E-post</label>
                        <input x-model="formData.contact_email" type="email"
                               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Telefon</label>
                        <input x-model="formData.contact_phone" type="text"
                               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" @click="showForm = false"
                                class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
                            Avbryt
                        </button>
                        <button type="submit"
                                class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">
                            Lagre
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete confirmation -->
    <div x-show="deleting" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex min-h-full items-center justify-center p-4">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75" @click="deleting = null"></div>
            <div class="relative w-full max-w-sm rounded-lg bg-white p-6 shadow-xl">
                <h3 class="text-lg font-medium text-gray-900">Slett kunde?</h3>
                <p class="mt-2 text-sm text-gray-500">Er du sikker? Denne handlingen kan ikke angres.</p>
                <div class="mt-4 flex justify-end space-x-3">
                    <button @click="deleting = null"
                            class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
                        Avbryt
                    </button>
                    <button @click="
                        const token = document.cookie.split('; ').find(c => c.startsWith('access_token='))?.split('=')[1];
                        await fetch('/customers/' + deleting, {method: 'DELETE', headers: {'Authorization': 'Bearer ' + token}});
                        deleting = null;
                        htmx.ajax('GET', '/app/customers/table', '#customer-table');
                    " class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-500">
                        Slett
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
